<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
  body {
    width: 1200px;
    height: 630px;
    background: #1a1a1a;
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Subtle gradient accent */
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
  }
  .glow-1 { background: #4285F4; top: -200px; left: -100px; }
  .glow-2 { background: #34A853; bottom: -200px; right: -100px; }
  .glow-3 { background: #FBBC05; top: -100px; right: 100px; opacity: 0.08; }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }
  .logos {
    display: flex;
    align-items: center;
    gap: 32px;
  }
  .logos img {
    height: 140px;
    width: 140px;
    object-fit: contain;
  }
  .divider {
    width: 2px;
    height: 100px;
    background: rgba(255,255,255,0.15);
    border-radius: 1px;
  }
  .title {
    font-size: 72px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -1px;
  }
  .tagline {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
  }
  .url {
    font-size: 18px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>
  <div class="content">
    <div class="logos">
      <img src="public/nitkkr.png" alt="NIT Kurukshetra">
      <div class="divider"></div>
      <img src="public/logo.webp" alt="Codespardha">
    </div>
    <div class="title">Codespardha</div>
    <div class="tagline">Competitive Programming Platform &mdash; NIT Kurukshetra</div>
    <div class="url">contest.codespardha.me</div>
  </div>
</body>
</html>
